services:
  # ================== DATABASE ==================
  db:
    image: mysql:8.0
    container_name: liora-mysql-dev
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: liora_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - liora-network

  # ================== REDIS ==================
  redis:
    image: redis:7-alpine
    container_name: liora-redis-dev
    restart: always
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - liora-network

  # ================== LIORA NESTADMIN BACKEND ==================
  nest-admin:
    build:
      context: ..
      dockerfile: apps/nest-admin-backend/Dockerfile
      target: development
    container_name: liora-nest-admin-dev
    restart: unless-stopped
    ports:
      - "7001:7001"
    environment:
      - NODE_ENV=development
      - PORT=7001
      # Database
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USERNAME=root
      - DB_PASSWORD=root123
      - DB_DATABASE=liora_db
      - DB_SYNCHRONIZE=true
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # JWT / Security
      - JWT_SECRET=liora-dev-jwt-secret-change-in-prod
      - JWT_EXPIRE=7
      - REFRESH_TOKEN_SECRET=liora-dev-refresh-secret-change-in-prod
      - REFRESH_TOKEN_EXPIRE=30
      # Internal communication key
      - INTERNAL_KEY=secret-sync-token
      # S3 / MinIO config
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=donut-sync-backend
      - S3_REGION=us-east-1
      - S3_FORCE_PATH_STYLE=true
    volumes:
      - ../apps:/app/apps
      - ../libs:/app/libs
      - ../nx.json:/app/nx.json
      - ../tsconfig.base.json:/app/tsconfig.base.json
      - ../tsconfig.json:/app/tsconfig.json
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - liora-network

  # ================== DONUT-SYNC BACKEND ==================
  donut-sync:
    build:
      context: ..
      dockerfile: apps/donut-sync-backend/Dockerfile
      target: development
    container_name: liora-donut-sync-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      # Sync token (for self-hosted mode or JWT cloud public key)
      - SYNC_TOKEN=secret-sync-token
      # Microservice REST communication config
      - BACKEND_INTERNAL_URL=http://nest-admin:7001
      - BACKEND_INTERNAL_KEY=secret-sync-token
      # S3 / MinIO config
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=donut-sync-backend
      - S3_REGION=us-east-1
      - S3_FORCE_PATH_STYLE=true
    volumes:
      - ../apps:/app/apps
      - ../libs:/app/libs
      - ../nx.json:/app/nx.json
      - ../tsconfig.base.json:/app/tsconfig.base.json
      - ../tsconfig.json:/app/tsconfig.json
    depends_on:
      minio:
        condition: service_healthy
      nest-admin:
        condition: service_started
    networks:
      - liora-network

  # ================== MINIO S3 STORAGE ==================
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"     # S3 API
      - "9003:9001"     # Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BROWSER: "on"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - liora-network

networks:
  liora-network:
    driver: bridge

volumes:
  mysql_data:
  minio_data: