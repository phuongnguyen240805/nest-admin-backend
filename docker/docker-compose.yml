services:
  # ================== DATABASE (PostgreSQL — default) ==================
  db:
    image: postgres:16-alpine
    container_name: liora-postgres-dev
    restart: always
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-liora_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-liora_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - liora-network

  # ================== DATABASE (MySQL — legacy rollback) ==================
  # Bật profile: docker compose --profile mysql up
  mysql:
    profiles: ["mysql"]
    image: mysql:8.0
    container_name: liora-mysql-dev
    restart: always
    env_file:
      - ../.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-liora_db}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - liora-network

  # ================== REDIS ==================
  redis:
    image: redis:7-alpine
    container_name: liora-redis-dev
    restart: always
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - liora-network

  # ================== LIBREFANG AGENT RUNTIME ==================
  # Profile tùy chọn — bỏ qua nếu port 4545 đã có instance khác (deploy-librefang)
  # docker compose --profile librefang up -d librefang
  librefang:
    profiles: ["librefang"]
    image: ghcr.io/librefang/librefang:latest
    container_name: liora-librefang-dev
    restart: unless-stopped
    ports:
      - "4545:4545"
    networks:
      - liora-network

  # ================== SCREENSHOT-TO-CODE (Landing AI) ==================
  # Profile tùy chọn — build nặng (Playwright + Poetry)
  # docker compose --profile s2c up -d screenshot-to-code
  screenshot-to-code:
    profiles: ["s2c"]
    build:
      context: ../../screenshot-to-code/backend
      dockerfile: Dockerfile
    container_name: liora-s2c-dev
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      BACKEND_PORT: "7010"
      LOCAL_ASSET_BASE_URL: http://screenshot-to-code:7010
    ports:
      - "7010:7010"
    command: poetry run uvicorn main:app --host 0.0.0.0 --port 7010
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:7010/api/capabilities')\""]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 120s
    networks:
      liora-network:
        aliases:
          - screenshot-to-code

  # ================== OPENSEO MICROSERVICE ==================
  # Official self-host needs CLOUDFLARE_INCLUDE_PROCESS_ENV so AUTH_MODE reaches
  # cloudflare:workers bindings (otherwise defaults to cloudflare_access → MCP 500).
  openseo:
    image: ${OPEN_SEO_IMAGE:-ghcr.io/every-app/open-seo:latest}
    container_name: liora-openseo-dev
    restart: unless-stopped
    env_file:
      - ../.env.openseo
    environment:
      # Expose process env to cloudflare:workers (required for AUTH_MODE)
      CLOUDFLARE_INCLUDE_PROCESS_ENV: "true"
      PORT: "7003"
      AUTH_MODE: local_noauth
      # Nest calls http://openseo:7003 — Host header "openseo" must be allowed (localhost always ok)
      ALLOWED_HOST: openseo
      # DATAFORSEO_API_KEY comes from env_file ../.env.openseo only.
      # Do NOT set DATAFORSEO_API_KEY: ${DATAFORSEO_API_KEY:-} here — an empty
      # host interpolation overrides env_file and breaks get_domain_overview.
      VITE_SHOW_DEVTOOLS: "false"
    ports:
      - "7003:7003"
    volumes:
      - openseo_data:/app/.wrangler
    networks:
      liora-network:
        aliases:
          - openseo

  # ================== UMAMI (AI-SEO traffic analytics) ==================
  # Host: http://localhost:7004  |  Docker network: http://umami:3000
  # Default login: admin / umami  (change password after first login)
  umami-db:
    image: postgres:15-alpine
    container_name: liora-umami-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${UMAMI_DB_NAME:-umami}
      POSTGRES_USER: ${UMAMI_DB_USER:-umami}
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:-umami}
    volumes:
      - umami_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${UMAMI_DB_USER:-umami} -d ${UMAMI_DB_NAME:-umami}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      liora-network:
        aliases:
          - umami-db

  umami:
    image: ${UMAMI_IMAGE:-ghcr.io/umami-software/umami:postgresql-latest}
    container_name: liora-umami-dev
    restart: unless-stopped
    ports:
      - "7004:3000"
    environment:
      DATABASE_URL: postgresql://${UMAMI_DB_USER:-umami}:${UMAMI_DB_PASSWORD:-umami}@umami-db:5432/${UMAMI_DB_NAME:-umami}
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET:-liora-umami-dev-secret-change-me-32chars}
      # Collect from browser on host / other containers
      TRACKER_SCRIPT_NAME: script.js
    depends_on:
      umami-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/heartbeat').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      liora-network:
        aliases:
          - umami

  # ================== NEST-ADMIN BACKEND (Liora control plane) ==================
  liora-nest-admin:
    build:
      context: ..
      dockerfile: apps/nest-admin-backend/Dockerfile
      target: development
    container_name: liora-nest-admin-dev
    restart: unless-stopped
    ports:
      - "7001:7001"
    env_file:
      - ../.env
    environment:
      # Chỉ override hostname/service trong mạng Docker (không lấy từ .env host)
      PORT: "7001"
      APP_CODE: nest-admin
      APP_SCOPED_AUTH: "false"
      DB_HOST: db
      DB_PORT: "5432"
      DB_TYPE: postgres
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      LIBREFANG_API_URL: ${LIBREFANG_API_URL:-http://host.docker.internal:4545}
      LIBREFANG_API_KEY: ${LIBREFANG_API_KEY:-}
      # Instatic on host — 127.0.0.1 inside this container is NOT the host
      INSTATIC_BASE_URL: ${INSTATIC_BASE_URL:-http://host.docker.internal:8787}
      INSTATIC_MOCK: ${INSTATIC_MOCK:-false}
      # Supabase / anti-spam: lấy từ env_file + mount ../.env (không override rỗng ở đây)
    volumes:
      - ../apps:/app/apps
      - ../libs:/app/libs
      - ../nx.json:/app/nx.json
      - ../tsconfig.base.json:/app/tsconfig.base.json
      - ../tsconfig.json:/app/tsconfig.json
      - /app/node_modules
      - ../.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:7001/docs/json').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 180s
    networks:
      liora-network:
        aliases:
          - nest-admin

  # ================== LADIPAGE BACKEND ==================
  liora-ladipage:
    build:
      context: ..
      dockerfile: apps/ladipage-backend/Dockerfile
      target: development
    container_name: liora-ladipage-dev
    restart: unless-stopped
    ports:
      - "7002:7002"
    env_file:
      - ../.env
    environment:
      PORT: "7002"
      LADIPAGE_PORT: "7002"
      APP_CODE: ladipage
      APP_SCOPED_AUTH: "false"
      # API chỉ enqueue — processor chạy ở liora-ladipage-worker (cùng ladipage-backend image)
      BULLMQ_RUN_WORKERS: ${LADIPAGE_BULLMQ_RUN_WORKERS_IN_API:-false}
      DB_TYPE: postgres
      DB_HOST: db
      DB_PORT: "5432"
      DB_SSL: "false"
      # TypeORM prefers DATABASE_URL over DB_HOST. Root .env often points at Supabase
      # pooler → getaddrinfo EAI_AGAIN breaks AI-SEO scan. Force local compose Postgres.
      DATABASE_URL: ""
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379/0
      LANDING_AI_MOCK_GENERATE: ${LANDING_AI_MOCK_GENERATE:-false}
      S3_ENDPOINT: http://minio:9000
      OPENSEO_BASE_URL: http://openseo:7003
      OPENSEO_MCP_URL: http://openseo:7003/mcp
      # Umami inside compose network (host Nest uses localhost:7004 via .env)
      UMAMI_ENABLED: ${UMAMI_ENABLED:-true}
      UMAMI_BASE_URL: http://umami:3000
      UMAMI_PUBLIC_SCRIPT_URL: ${UMAMI_PUBLIC_SCRIPT_URL:-http://localhost:7004}
      UMAMI_API_KEY: ${UMAMI_API_KEY:-}
      UMAMI_USERNAME: ${UMAMI_USERNAME:-admin}
      UMAMI_PASSWORD: ${UMAMI_PASSWORD:-umami}
      SCREENSHOT_TO_CODE_HTTP_URL: http://screenshot-to-code:7010
      SCREENSHOT_TO_CODE_WS_URL: ws://screenshot-to-code:7010
      LIBREFANG_API_URL: ${LIBREFANG_API_URL:-http://host.docker.internal:4545}
      LIBREFANG_API_KEY: ${LIBREFANG_API_KEY:-}
      # Instatic on host — 127.0.0.1 inside this container is NOT the host
      INSTATIC_BASE_URL: ${INSTATIC_BASE_URL:-http://host.docker.internal:8787}
      INSTATIC_MOCK: ${INSTATIC_MOCK:-false}
      # Supabase / anti-spam: lấy từ env_file + mount ../.env (không override rỗng ở đây)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../apps:/app/apps
      - ../libs:/app/libs
      - ../scripts:/app/scripts
      - ../package.json:/app/package.json:ro
      - ../pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      - ../pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      - ../nx.json:/app/nx.json
      - ../tsconfig.base.json:/app/tsconfig.base.json
      - ../tsconfig.json:/app/tsconfig.json
      - /app/node_modules
      - ../.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      openseo:
        condition: service_started
      umami:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:7002/api/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 120s
    networks:
      liora-network:
        aliases:
          - ladipage

  # ================== LADIPAGE BULLMQ WORKER (processors — cùng app ladipage-backend) ==================
  liora-ladipage-worker:
    build:
      context: ..
      dockerfile: apps/ladipage-backend/Dockerfile
      target: development
    container_name: liora-ladipage-worker-dev
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      APP_CODE: ladipage
      APP_SCOPED_AUTH: "false"
      BULLMQ_ENABLED: "true"
      BULLMQ_RUN_WORKERS: "true"
      BULLMQ_PREFIX: ${BULLMQ_PREFIX:-liora:ladipage}
      DB_TYPE: postgres
      DB_HOST: db
      DB_PORT: "5432"
      DB_SSL: "false"
      DATABASE_URL: ""
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379/0
      SCREENSHOT_TO_CODE_HTTP_URL: http://screenshot-to-code:7010
      SCREENSHOT_TO_CODE_WS_URL: ws://screenshot-to-code:7010
      LANDING_AI_MOCK_GENERATE: ${LANDING_AI_MOCK_GENERATE:-false}
      UMAMI_ENABLED: ${UMAMI_ENABLED:-true}
      UMAMI_BASE_URL: http://umami:3000
      UMAMI_PUBLIC_SCRIPT_URL: ${UMAMI_PUBLIC_SCRIPT_URL:-http://localhost:7004}
      UMAMI_USERNAME: ${UMAMI_USERNAME:-admin}
      UMAMI_PASSWORD: ${UMAMI_PASSWORD:-umami}
      OPENSEO_BASE_URL: http://openseo:7003
      OPENSEO_MCP_URL: http://openseo:7003/mcp
    command: ["pnpm", "nx", "serve-worker", "ladipage-backend", "--skip-nx-cache"]
    volumes:
      - ../apps:/app/apps
      - ../libs:/app/libs
      - ../scripts:/app/scripts
      - ../package.json:/app/package.json:ro
      - ../pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      - ../pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      - ../nx.json:/app/nx.json
      - ../tsconfig.base.json:/app/tsconfig.base.json
      - ../tsconfig.json:/app/tsconfig.json
      - /app/node_modules
      - ../.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      liora-ladipage:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const fs=require('fs');const p='/proc/1/cmdline';if(!fs.existsSync(p))process.exit(1);const c=fs.readFileSync(p,'utf8');process.exit(c.includes('serve-worker')||c.includes('worker.main')?0:1)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 180s
    networks:
      liora-network:
        aliases:
          - ladipage-worker
          - ladipage-ai-worker

  # ================== DONUT-SYNC BACKEND ==================
  donut-sync:
    build:
      context: ..
      dockerfile: apps/donut-sync-backend/Dockerfile
      target: development
    container_name: liora-donut-sync-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      PORT: "3000"
      BACKEND_INTERNAL_URL: http://nest-admin:7001
      S3_ENDPOINT: http://minio:9000
    volumes:
      - ../apps:/app/apps
      - ../libs:/app/libs
      - ../nx.json:/app/nx.json
      - ../tsconfig.base.json:/app/tsconfig.base.json
      - ../tsconfig.json:/app/tsconfig.json
      - ../.env:/app/.env:ro
    depends_on:
      minio:
        condition: service_healthy
      liora-nest-admin:
        condition: service_started
    networks:
      - liora-network

  # ================== MINIO ==================
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"
      - "9003:9001"
    env_file:
      - ../.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BROWSER: "on"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - liora-network

networks:
  liora-network:
    driver: bridge

volumes:
  postgres_data:
  mysql_data:
  minio_data:
  umami_db_data:
  openseo_data:
