services:
  # ================== DATABASE ==================
  db:
    image: mysql:8.0
    container_name: liora-mysql-dev
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: liora_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ================== DONUT-SYNC BACKEND (DEV MODE) ==================
  donut-sync:
    build:
      context: ..
      dockerfile: apps/donut-sync-backend/Dockerfile
      target: development          
    container_name: liora-donut-sync-dev
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=mysql://root:root123@db:3306/liora_db
        # === S3 / MinIO config ===
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=donut-sync-backend         
      - S3_REGION=us-east-1
      - S3_FORCE_PATH_STYLE=true
    volumes:
      - ..:/app                   
      - /app/node_modules         
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
  
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"     # S3 API
      - "9001:9001"     # Console UI (truy cập http://localhost:9001)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BROWSER: "on"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mysql_data:
  minio_data: