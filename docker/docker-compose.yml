services:
  # ================== DATABASE ==================
  db:
    image: mysql:8.0
    container_name: liora-mysql-dev
    restart: always
    env_file:
      - ../.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-liora_db}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - liora-network

  # ================== REDIS ==================
  redis:
    image: redis:7-alpine
    container_name: liora-redis-dev
    restart: always
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - liora-network

  # ================== LIBREFANG AGENT RUNTIME ==================
  librefang:
    image: librefang/librefang:latest
    container_name: liora-librefang-dev
    restart: unless-stopped
    ports:
      - "4545:4545"
    networks:
      - liora-network

  # ================== NEST-ADMIN BACKEND (Liora control plane) ==================
  liora-nest-admin:
    build:
      context: ..
      dockerfile: apps/nest-admin-backend/Dockerfile
      target: development
    container_name: liora-nest-admin-dev
    restart: unless-stopped
    ports:
      - "7001:7001"
    env_file:
      - ../.env
    environment:
      # Chỉ override hostname/service trong mạng Docker (không lấy từ .env host)
      PORT: "7001"
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      LIBREFANG_API_URL: http://librefang:4545
      LIBREFANG_API_KEY: ${LIBREFANG_API_KEY:-}
      USE_SUPABASE_AUTH: ${USE_SUPABASE_AUTH:-false}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_KEY: ${SUPABASE_KEY:-}
      SUPABASE_ALLOWED_DOMAINS: ${SUPABASE_ALLOWED_DOMAINS:-gmail.com}
      SUPABASE_BLOCKED_DOMAINS: ${SUPABASE_BLOCKED_DOMAINS:-}
    volumes:
      - ../apps:/app/apps
      - ../libs:/app/libs
      - ../nx.json:/app/nx.json
      - ../tsconfig.base.json:/app/tsconfig.base.json
      - ../tsconfig.json:/app/tsconfig.json
      - /app/node_modules
      - ../.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      librefang:
        condition: service_started
    networks:
      liora-network:
        aliases:
          - nest-admin

  # ================== DONUT-SYNC BACKEND ==================
  donut-sync:
    build:
      context: ..
      dockerfile: apps/donut-sync-backend/Dockerfile
      target: development
    container_name: liora-donut-sync-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      PORT: "3000"
      BACKEND_INTERNAL_URL: http://nest-admin:7001
      S3_ENDPOINT: http://minio:9000
    volumes:
      - ../apps:/app/apps
      - ../libs:/app/libs
      - ../nx.json:/app/nx.json
      - ../tsconfig.base.json:/app/tsconfig.base.json
      - ../tsconfig.json:/app/tsconfig.json
      - ../.env:/app/.env:ro
    depends_on:
      minio:
        condition: service_healthy
      liora-nest-admin:
        condition: service_started
    networks:
      - liora-network

  # ================== MINIO ==================
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"
      - "9003:9001"
    env_file:
      - ../.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BROWSER: "on"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - liora-network

networks:
  liora-network:
    driver: bridge

volumes:
  mysql_data:
  minio_data:
