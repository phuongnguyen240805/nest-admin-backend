# docker/docker-compose.prod.yml
version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: liora-mysql-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.base
      target: production                    # stage production
    container_name: liora-api-prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://${DB_USER}:${DB_PASSWORD}@db:3306/${DB_NAME}
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: liora-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/web/default.conf:/etc/nginx/conf.d/default.conf:ro   # nếu bạn copy từ cũ
    depends_on:
      - api

volumes:
  mysql_data: