version: '3.9'

services:
  donut-sync:
    build:
      context: ../../               
      dockerfile: apps/donut-sync-backend/Dockerfile
      target: production
    container_name: liora-donut-sync
    restart: unless-stopped
    ports:
      - "3001:3000"                 
    environment:
      - NODE_ENV=production
      - SYNC_TOKEN=${SYNC_TOKEN}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - liora_network

networks:
  liora_network:
    driver: bridge